version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=monolith_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    #ports:
    #  - "6379:6379"

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
      - audio_data:/tmp/audio_uploads
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info -c 1
    volumes:
      - .:/code
      - audio_data:/tmp/audio_uploads
    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
  audio_data: